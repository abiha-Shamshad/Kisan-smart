<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kisan Smart — Pest Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --g1: #1B4332;
            --g2: #2D6A4F;
            --g3: #40916C;
            --g4: #74C69D;
            --g5: #D8F3DC;
            --amber: #B45309;
            --amber-bg: #FEF3C7;
            --red: #991B1B;
            --red-bg: #FEE2E2;
            --orange: #C2410C;
            --orange-bg: #FFEDD5;
            --bg: #F0F4EF;
            --card: #fff;
            --text: #1A2E1E;
            --muted: #5A7060;
            --border: #C9DEC9;
            --r: 14px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6
        }

        a {
            color: inherit;
            text-decoration: none
        }

        /* Nav */
        nav {
            background: var(--g1);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .nav-logo span {
            color: var(--g4)
        }

        .nav-back {
            color: rgba(255, 255, 255, .7);
            font-size: .8rem;
            display: flex;
            align-items: center;
            gap: .3rem;
            margin-left: auto;
            cursor: pointer;
            transition: color .15s
        }

        .nav-back:hover {
            color: #fff
        }

        /* Page */
        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem
        }

        /* Alert banner */
        .alert-banner {
            border-radius: var(--r);
            padding: 1.1rem 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: .75rem;
        }

        .ab-critical {
            background: var(--red-bg);
            border: 1.5px solid #FECACA
        }

        .ab-high {
            background: var(--orange-bg);
            border: 1.5px solid #FED7AA
        }

        .ab-medium {
            background: var(--amber-bg);
            border: 1.5px solid #FDE68A
        }

        .ab-low {
            background: var(--g5);
            border: 1px solid var(--border)
        }

        .ab-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
            margin-top: .05rem
        }

        .ab-title {
            font-family: 'Syne', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: .15rem
        }

        .ab-critical .ab-title {
            color: var(--red)
        }

        .ab-high .ab-title {
            color: var(--orange)
        }

        .ab-medium .ab-title {
            color: var(--amber)
        }

        .ab-low .ab-title {
            color: var(--g2)
        }

        .ab-body {
            font-size: .82rem;
            color: var(--muted);
            line-height: 1.5
        }

        .ab-urdu {
            font-size: .78rem;
            opacity: .7;
            margin-top: .1rem
        }

        /* Section heading */
        .sec-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.5rem 0 .75rem;
        }

        .sec-head h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text)
        }

        .sec-tag {
            font-size: .75rem;
            color: var(--muted);
            background: var(--g5);
            padding: .2rem .7rem;
            border-radius: 100px
        }

        /* Score cards grid */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: .75rem;
            margin-bottom: 1.5rem
        }

        .score-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: border-color .15s, transform .1s;
        }

        .score-card:hover {
            border-color: var(--g3);
            transform: translateY(-1px)
        }

        .sc-crop {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: .3rem
        }

        .sc-pest {
            font-size: .85rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: .5rem
        }

        .sc-urdu {
            font-size: .72rem;
            color: var(--muted);
            margin-bottom: .65rem
        }

        .sc-bar-bg {
            height: 6px;
            background: var(--g5);
            border-radius: 3px;
            margin-bottom: .4rem;
            overflow: hidden
        }

        .sc-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .8s cubic-bezier(.16, 1, .3, 1)
        }

        .fill-critical {
            background: #EF4444
        }

        .fill-high {
            background: #F97316
        }

        .fill-medium {
            background: #F59E0B
        }

        .fill-low {
            background: var(--g3)
        }

        .sc-footer {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .sc-score {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700
        }

        .sc-sev {
            font-size: .7rem;
            font-weight: 600;
            padding: .15rem .55rem;
            border-radius: 100px
        }

        .sev-critical {
            background: #FEE2E2;
            color: var(--red)
        }

        .sev-high {
            background: #FFEDD5;
            color: var(--orange)
        }

        .sev-medium {
            background: #FEF3C7;
            color: var(--amber)
        }

        .sev-low {
            background: var(--g5);
            color: var(--g2)
        }

        /* Detail panel */
        .detail {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .detail-top {
            padding: 1.2rem 1.4rem;
            display: flex;
            align-items: center;
            gap: .75rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--g5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0
        }

        .detail-pest {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700
        }

        .detail-sub {
            font-size: .8rem;
            color: var(--muted)
        }

        .detail-body {
            padding: 1.2rem 1.4rem
        }

        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-bottom: .75rem
        }

        .detail-box {
            background: var(--bg);
            border-radius: 10px;
            padding: .8rem 1rem
        }

        .db-label {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--muted);
            margin-bottom: .2rem
        }

        .db-val {
            font-size: .88rem;
            color: var(--text);
            line-height: 1.4
        }

        .triggers-list {
            list-style: none
        }

        .triggers-list li {
            font-size: .8rem;
            color: var(--muted);
            padding: .3rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .triggers-list li:last-child {
            border: none
        }

        .trigger-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--g3);
            flex-shrink: 0
        }

        /* Report form */
        .report-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.3rem 1.4rem;
        }

        .report-title {
            font-family: 'Syne', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-bottom: .75rem
        }

        .form-field label {
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            display: block;
            margin-bottom: .35rem
        }

        .form-field select,
        .form-field input {
            width: 100%;
            padding: .6rem .85rem;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            color: var(--text);
            background: #fff;
            appearance: none;
            transition: border-color .15s
        }

        .form-field select:focus,
        .form-field input:focus {
            outline: none;
            border-color: var(--g3);
            box-shadow: 0 0 0 3px rgba(64, 145, 108, .1)
        }

        .btn-report {
            width: 100%;
            padding: .75rem;
            background: var(--g2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            transition: background .15s;
            margin-top: .5rem
        }

        .btn-report:hover {
            background: var(--g3)
        }

        /* Weather summary */
        .weather-row {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem
        }

        .weather-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .6rem 1rem;
            font-size: .82rem;
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .weather-chip strong {
            font-weight: 500;
            color: var(--text)
        }

        .weather-chip span {
            color: var(--muted);
            font-size: .75rem
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.2rem;
            right: 1.2rem;
            z-index: 99;
            background: var(--g1);
            color: #fff;
            border-radius: 10px;
            padding: .7rem 1.1rem;
            font-size: .83rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: all .25s
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        .toast.err {
            background: var(--red)
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-logo">🌱 Kisan <span>Smart</span></div>
        <div class="nav-back" onclick="location.href='/app/dashboard.html'">← Dashboard</div>
    </nav>

    <div class="page">

        <!-- Weather summary strip -->
        <div id="weather-strip" class="weather-row" style="display:none"></div>

        <!-- Top alert banners (Critical / High only) -->
        <div id="banners"></div>

        <!-- All scores -->
        <div class="sec-head">
            <h2>All pest & disease risks</h2>
            <span class="sec-tag" id="crop-label">Loading assessments...</span>
        </div>
        <div class="score-grid" id="score-grid">
            <p style="padding: 2rem; color: var(--muted); text-align: center; grid-column: 1/-1;">Fetching latest
                data...</p>
        </div>

        <!-- Detail panel -->
        <div class="detail" id="detail-panel" style="display:none"></div>

        <!-- Report sighting -->
        <div class="sec-head">
            <h2>Report a sighting</h2>
            <span class="sec-tag">Help other farmers</span>
        </div>
        <div class="report-card">
            <div class="report-title">📋 I spotted a pest / disease</div>
            <div class="form-row">
                <div class="form-field">
                    <label>Crop</label>
                    <select id="r-crop">
                        <option value="Wheat">Wheat (گندم)</option>
                        <option value="Rice">Rice (چاول)</option>
                        <option value="Maize">Maize (مکئی)</option>
                        <option value="Cotton">Cotton (کپاس)</option>
                        <option value="Sugarcane">Sugarcane (گنا)</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Pest / Disease</label>
                    <select id="r-pest">
                        <option value="Yellow Rust">Yellow Rust — پیلی کنگی</option>
                        <option value="Brown Rust">Brown Rust — بھوری کنگی</option>
                        <option value="Rice Blast">Rice Blast — بلاسٹ</option>
                        <option value="Whitefly">Whitefly — سفید مکھی</option>
                        <option value="Fall Armyworm">Fall Armyworm — فال آرمی ورم</option>
                        <option value="Desert Locust">Desert Locust — ٹڈی دل</option>
                        <option value="Other">Other / دیگر</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label>Severity</label>
                    <select id="r-severity">
                        <option value="Low">Low — کم</option>
                        <option value="Medium">Medium — درمیانہ</option>
                        <option value="High" selected>High — زیادہ</option>
                        <option value="Critical">Critical — خطرناک</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Field location (optional)</label>
                    <input type="text" id="r-location" placeholder="Village / Tehsil name" />
                </div>
            </div>
            <button class="btn-report" id="btn-submit" onclick="submitReport()">📤 Submit Report — رپورٹ کریں</button>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentData = null;
        let selectedPestName = null;

        // Helper for classes
        const sevClass = s => s === 'Critical' ? 'critical' : s === 'High' ? 'high' : s === 'Medium' ? 'medium' : 'low';
        const fillClass = s => 'fill-' + sevClass(s);
        const bannerClass = s => 'ab-' + sevClass(s);

        async function init() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                location.href = '/app/login.html';
                return;
            }

            // Default to Gujrat, Punjab if no location set
            const lat = 32.57;
            const lon = 74.08;
            const crop = 'Wheat';

            try {
                const resp = await fetch(`/api/v1/pest/assess?lat=${lat}&lon=${lon}&crop=${crop}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!resp.ok) throw new Error('Failed to fetch risk data');
                const data = await resp.json();
                currentData = data;
                render(data);

                // Fetch district alerts too
                const alertResp = await fetch(`/api/v1/pest/district-alerts?lat=${lat}&lon=${lon}&crop=${crop}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (alertResp.ok) {
                    const alerts = await alertResp.json();
                    renderDistrictBanners(alerts.alerts);
                }

            } catch (err) {
                showToast(err.message, true);
                document.getElementById('score-grid').innerHTML = `<p style="padding:2rem;color:var(--red);text-align:center;grid-column:1/-1;">Error loading data. Please try again.</p>`;
            }
        }

        function render(data) {
            document.getElementById('crop-label').textContent = `${data.crop} — Region: ${data.location.lat}, ${data.location.lon}`;

            if (!data.risks || data.risks.length === 0) {
                document.getElementById('score-grid').innerHTML = `<p style="padding:2rem;color:var(--muted);text-align:center;grid-column:1/-1;">No risks detected for your crop currently.</p>`;
                return;
            }

            const grid = document.getElementById('score-grid');
            grid.innerHTML = data.risks.map(r => `
        <div class="score-card" onclick="selectPest('${r.pest.replace(/'/g, "\\'")}')">
            <div class="sc-crop">${data.crop}</div>
            <div class="sc-pest">${r.pest}</div>
            <div class="sc-urdu">${r.urdu_name || ''}</div>
            <div class="sc-bar-bg"><div class="sc-bar-fill ${fillClass(r.severity)}" style="width:0%" data-w="${r.score}%"></div></div>
            <div class="sc-footer">
                <div class="sc-score">${r.score}<small style="font-size:.55em;font-weight:400">/100</small></div>
                <span class="sc-sev sev-${sevClass(r.severity)}">${r.severity}</span>
            </div>
        </div>
    `).join('');

            setTimeout(() => {
                document.querySelectorAll('.sc-bar-fill').forEach(el => el.style.width = el.dataset.w);
            }, 100);
        }

        function renderDistrictBanners(alerts) {
            const bannerContainer = document.getElementById('banners');
            const confirmed = alerts.filter(a => a.confirmed || a.max_severity === 'Critical');

            if (confirmed.length === 0) return;

            bannerContainer.innerHTML = confirmed.map(a => `
        <div class="alert-banner ${bannerClass(a.max_severity)}">
            <div class="ab-icon">${a.max_severity === 'Critical' ? '🚨' : '⚠️'}</div>
            <div>
                <div class="ab-title">${a.max_severity}: ${a.pest} outbreak reported in your district</div>
                <div class="ab-body">Confirmed by ${a.report_count} nearby farmers. Inspect your fields immediately.</div>
            </div>
        </div>
    `).join('');
        }

        function selectPest(name) {
            const risk = currentData.risks.find(r => r.pest === name);
            if (!risk) return;

            const panel = document.getElementById('detail-panel');
            if (selectedPestName === name) {
                panel.style.display = 'none';
                selectedPestName = null;
                return;
            }

            selectedPestName = name;
            panel.style.display = 'block';

            const icons = { 'Critical': '🚨', 'High': '⚠️', 'Medium': '🔶', 'Low': '✅' };
            const triggersHtml = risk.triggered_by.length
                ? `<ul class="triggers-list">${risk.triggered_by.map(t => `<li><span class="trigger-dot"></span>${t}</li>`).join('')}</ul>`
                : `<p style="font-size:.8rem;color:var(--muted)">No specific weather triggers identified.</p>`;

            panel.innerHTML = `
        <div class="detail-top">
            <div class="detail-icon">${icons[risk.severity] || '🌿'}</div>
            <div>
                <div class="detail-pest">${risk.pest} <span style="font-size:.75rem;font-weight:400;color:var(--muted)">${risk.urdu_name || ''}</span></div>
                <div class="detail-sub">${risk.severity} Risk · Score ${risk.score}/100</div>
            </div>
        </div>
        <div class="detail-body">
            <div class="detail-row">
                <div class="detail-box">
                    <div class="db-label">Recommended action</div>
                    <div class="db-val">${risk.treatment}</div>
                </div>
                <div class="detail-box">
                    <div class="db-label">Suggested Pesticide</div>
                    <div class="db-val">${risk.pesticide}</div>
                </div>
            </div>
            <div class="db-label" style="margin-bottom:.5rem;">Weather Analysis</div>
            ${triggersHtml}
        </div>
    `;
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function submitReport() {
            const crop = document.getElementById('r-crop').value;
            const pest = document.getElementById('r-pest').value;
            const severity = document.getElementById('r-severity').value;
            const btn = document.getElementById('btn-submit');
            const token = localStorage.getItem('access_token');

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const resp = await fetch('/api/v1/pest/report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        crop,
                        pest_name: pest,
                        severity,
                        lat: 32.57,
                        lon: 74.08
                    })
                });

                if (!resp.ok) throw new Error('Submission failed');

                showToast('✅ Sighting reported. Thank you for helping the community!');
                document.getElementById('r-location').value = '';
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Submit Report — رپورٹ کریں';
            }
        }

        function showToast(msg, isErr = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isErr ? ' err' : '');
            setTimeout(() => t.className = 'toast', 4000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
