<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Kisan Smart - AI-Based Fertilizer Recommendation System" />
    <title>Login - Kisan Smart</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <!-- Your design system CSS -->
    <link rel="stylesheet" href="/app/css/theme.css" />
    <link rel="stylesheet" href="/app/css/utilities.css" />
</head>

<body
    style="background: var(--background); color: var(--foreground); min-height: 100vh; font-family: var(--font-inter);">

    <div class="app-background"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, hsla(142, 70%, 10%, 0.1) 0%, hsla(210, 40%, 98%, 1) 100%);">
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav mx-2 mx-md-4 mt-3 rounded-pill p-2"
        style="z-index: 1000;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/app/login.html"
                style="font-family: var(--font-poppins); color: var(--primary);">
                <i class="fas fa-seedling me-2"></i>Kisan Smart
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a class="nav-link px-3 text-white" href="/app/login.html">Login</a>
                <a class="btn-premium py-2 px-4 text-decoration-none text-white" href="/app/register.html">Join Us</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content" style="margin-top: 100px; min-height: calc(100vh - 200px);">
        <div class="container">

            <div class="auth-wrapper d-flex align-items-center justify-content-center"
                style="min-height: 80vh; padding: 20px;">
                <div class="glass-panel p-4 p-md-5 reveal" style="max-width: 450px; width: 100%;">
                    <div class="text-center mb-4">
                        <div class="brand-icon mb-3 float" style="font-size: 3rem; color: var(--primary);">
                            <i class="fas fa-leaf"></i>
                        </div>
                        <h2 class="fw-bold" style="font-family: var(--font-poppins);">Welcome Back</h2>
                        <p class="text-muted">Enter your credentials to access your field data</p>
                    </div>

                    <!-- Alert area -->
                    <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="input-premium w-100" id="email" name="email"
                                placeholder="farmer@kisan.smart" required autofocus />
                            <div class="invalid-feedback" id="email-error"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="password-input-wrapper position-relative">
                                <input type="password" class="input-premium w-100" id="password" name="password"
                                    placeholder="••••••••" required />
                                <button type="button" id="pw-toggle"
                                    class="position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent px-3 py-2 text-muted">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="password-error"></div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me" />
                                <label class="form-check-label small" for="remember_me">Stay signed in</label>
                            </div>
                            <a href="#" class="text-decoration-none small fw-semibold"
                                style="color: var(--primary);">Forgot Password?</a>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-premium w-100 py-3 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i><span id="btn-text">Sign In</span>
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="small text-muted mb-0">Don't have an account?
                            <a href="/app/register.html" class="fw-bold text-decoration-none"
                                style="color: var(--primary);">Join the community</a>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem('auth_token')) {
            window.location.href = '/app/dashboard.html';
        }

        // Password toggle
        document.getElementById('pw-toggle').addEventListener('click', function () {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        function showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type} mb-3`;
        }

        function markError(id, msg) {
            const input = document.getElementById(id);
            const err = document.getElementById(id + '-error');
            if (input) { input.classList.add('is-invalid'); input.classList.remove('is-valid'); }
            if (err) { err.textContent = msg; err.style.display = 'block'; }
        }

        function clearErrors() {
            ['email', 'password'].forEach(id => {
                const input = document.getElementById(id);
                const err = document.getElementById(id + '-error');
                if (input) { input.classList.remove('is-invalid', 'is-valid'); }
                if (err) { err.style.display = 'none'; }
            });
            document.getElementById('alertBox').className = 'alert d-none mb-3';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember_me').checked;

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                markError('email', 'Please enter a valid email address');
                return;
            }
            if (!password) {
                markError('password', 'Password is required');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.textContent = 'Signing in…';

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember_me: rememberMe })
                });
                const data = await response.json();

                if (!response.ok) throw new Error(data.error?.message || 'Login failed');

                // Store auth data
                localStorage.setItem('auth_token', data.data.access_token);
                if (data.data.user?.email) localStorage.setItem('user_email', data.data.user.email);
                if (data.data.user?.username) localStorage.setItem('user_name', data.data.user.username);

                showAlert('✅ Login successful! Redirecting…', 'success');
                setTimeout(() => { window.location.href = '/app/dashboard.html'; }, 800);

            } catch (err) {
                showAlert(err.message || 'Login failed. Please try again.');
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
