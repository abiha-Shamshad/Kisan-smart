name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: kisan_smart_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: 3.8
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 bandit safety
    
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 app website --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app website --count --max-line-length=100 --statistics --exit-zero
    
    - name: Security scan with bandit
      run: |
        bandit -r app website -ll
      continue-on-error: true
    
    - name: Check for known security vulnerabilities
      run: |
        safety check
      continue-on-error: true
    
    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h"127.0.0.1" --silent; do
          sleep 1
        done
    
    - name: Run unit tests
      run: |
        pytest tests/unit -v --cov=app --cov=website --cov-report=xml --cov-report=term-missing
      env:
        DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/kisan_smart_test
        SECRET_KEY: test-secret-key-for-ci
        FLASK_ENV: testing
    
    - name: Run integration tests
      run: |
        pytest tests/integration -v
      env:
        DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/kisan_smart_test
        SECRET_KEY: test-secret-key-for-ci
        FLASK_ENV: testing
    
    - name: Run security tests
      run: |
        pytest tests/security -v
      env:
        DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/kisan_smart_test
        SECRET_KEY: test-secret-key-for-ci
        FLASK_ENV: testing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
    
    - name: Check coverage threshold
      run: |
        coverage report --fail-under=80
      continue-on-error: true
    
    - name: Generate coverage badge
      run: |
        coverage-badge -o coverage.svg
      continue-on-error: true
    
    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/
