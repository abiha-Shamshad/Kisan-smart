{% extends "base.html" %}
{% block title %}Recommendation Results - Kisan Smart{% endblock %}

{% block extra_css %}
<style>
  .tool-container { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1rem; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div class="tool-container" id="resultsContainer">
    <div class="text-center py-20 bg-white border border-[#EAE9E4] rounded-[24px] shadow-sm">
        <div class="w-16 h-16 border-4 border-[#2D6A4F] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <h3 class="font-serif text-[#1B3022] text-xl mb-1">Analyzing Field Data</h3>
        <p class="text-[#8A8478] text-sm">Generating AI-driven fertilizer recommendations...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/results.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        ResultsDashboard.init();
    });
</script>
{% endblock %}
