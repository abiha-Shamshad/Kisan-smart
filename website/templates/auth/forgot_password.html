{% extends "base.html" %}
{% block title %}Forgot Password - Kisan Smart{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-key me-2"></i>Forgot Password</h2>
        <p class="text-center text-muted mb-4">Enter your email address and we'll send you a reset link</p>

        <form id="forgotPasswordForm">
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required autofocus />
                <div class="invalid-feedback"></div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3">
                <i class="fas fa-paper-plane me-2"></i>Send Reset Link
            </button>
        </form>

        <div class="auth-links">
            <small>Remember your password? <a href="/login">Back to Login</a></small>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');

        // Real-time email validation
        emailInput.addEventListener('blur', function () {
            const result = Validators.validateEmail(this.value);
            if (!result.valid) {
                ValidationUI.showFieldError('email', result.message);
            } else {
                ValidationUI.showFieldSuccess('email');
            }
        });

        // Form submission
        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            ValidationUI.clearAllFeedback('forgotPasswordForm');

            const email = emailInput.value;

            // Validate email
            const emailResult = Validators.validateEmail(email);
            if (!emailResult.valid) {
                ValidationUI.showFieldError('email', emailResult.message);
                Toast.error('Please enter a valid email address');
                return;
            }

            // Submit to API
            FormHelpers.setButtonLoading(submitBtn, true);

            try {
                await api.forgotPassword(email);

                Toast.success('Reset link sent! Please check your email.');

                // Show success message
                form.innerHTML = `
                <div class="alert alert-success text-center">
                    <i class="fas fa-check-circle fa-3x mb-3"></i>
                    <h5>Email Sent!</h5>
                    <p class="mb-0">We've sent a password reset link to <strong>${email}</strong>. Please check your inbox and follow the instructions.</p>
                </div>
                <div class="text-center mt-3">
                    <a href="/login" class="btn btn-primary">Back to Login</a>
                </div>
            `;

            } catch (error) {
                Toast.error(error.message || 'Failed to send reset link. Please try again.');
            } finally {
                FormHelpers.setButtonLoading(submitBtn, false);
            }
        });
    });
</script>
{% endblock %}
